version: '3.8'

services:

  # --- PHP + Apache ---
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: gocgiasu_app
    restart: unless-stopped
    volumes:
      # Mount toàn bộ source code vào container
      # Windows: dùng đường dẫn kiểu C:\Users\... hoặc ./
      # Linux/Mac: ./ là đủ
      - ./src:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gocgiasu_net

  # --- Nginx reverse proxy ---
  nginx:
    image: nginx:1.25-alpine
    container_name: gocgiasu_nginx
    restart: unless-stopped
    ports:
      - "8080:80"        # truy cập qua http://localhost:8080
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - gocgiasu_net

  # --- MySQL ---
  db:
    image: mysql:8.0
    container_name: gocgiasu_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE:      gocgiasu_db
      MYSQL_USER:          gocgiasu_user
      MYSQL_PASSWORD:      gocgiasu_pass
    volumes:
      # Lưu data MySQL ra ngoài để không mất khi restart
      - gocgiasu_db_data:/var/lib/mysql
      # Tự động chạy schema.sql khi khởi tạo lần đầu
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "3307:3306"      # dùng 3307 để tránh xung đột nếu máy đã có MySQL
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gocgiasu_net

  # --- phpMyAdmin (quản lý DB bằng giao diện web) ---
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: gocgiasu_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"        # truy cập qua http://localhost:8081
    environment:
      PMA_HOST:     db
      PMA_PORT:     3306
      PMA_USER:     root
      PMA_PASSWORD: rootpassword
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gocgiasu_net

networks:
  gocgiasu_net:
    driver: bridge

volumes:
  gocgiasu_db_data:
