<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký Gia sư | Góc Gia Sư</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
    
    
</head>
<body font-family: 'Roboto', sans-serif;">
    <nav class="navbar-expand-lg navbar-dark shadow-sm bg-primary-custom sticky-top py-3">
        <div class="container">
            <img src="../assets/graduation.png" width="50">
            <a class="navbar-brand ms-1 fw-bold text-teal" href="#">Góc Gia Sư</a>
        </div>
    </nav>
    <div class="container mt-5 mb-5">
        <div class="card shadow-lg border-0 rounded-4 mx-auto" style="max-width: 800px;">
            <div class="card-header text-white text-center py-3 rounded-top-4 bg-teal" style="background-color: #005C53;">
                <h2 class="mb-0 fw-bold text-white">ĐĂNG KÝ GIA SƯ</h2>
            </div>
            <div class="card-body p-4 p-md-5">
                <div class="d-flex justify-content-between mb-5 step-indicator text-center">
                    <div class="step active fw-bold text-white" id="indicator-1">1. Tài khoản & Cá nhân</div>
                    <div class="step fw-bold text-muted" id="indicator-2">2. Học vấn & Chứng chỉ</div>
                    <div class="step fw-bold text-muted" id="indicator-3">3. Nhu cầu dạy</div>
                </div>
                <form id="tutorForm">
                    <div class="step-content active" id="step-1">
                        <div class="row">
                            <div class="col-md-8 pe-md-4">
                                <div class="input-group mb-3">
                                    <span class="input-group-text bg-white text-teal" style="color: #005C53;"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control required" placeholder="Họ và tên" required>
                                </div>
                                <div class="input-group mb-3">
                                    <span class="input-group-text bg-white text-teal" style="color: #005C53;"><i class="bi bi-calendar"></i></span>
                                    <input type="date" class="form-control">
                                </div>
                                <div class="input-group mb-3">
                                    <span class="input-group-text bg-white text-teal" style="color: #005C53;"><i class="bi bi-gender-ambiguous"></i></span>
                                    <select class="form-select">
                                        <option selected disabled>Giới tính</option>
                                        <option value="Nam">Nam</option>
                                        <option value="Nữ">Nữ</option>
                                    </select>
                                </div>
                                <div class="input-group mb-3">
                                    <span class="input-group-text bg-white text-teal" style="color: #005C53;"><i class="bi bi-credit-card-2-front"></i></span>
                                    <input type="text" class="form-control required" placeholder="CCCD" required>
                                </div>
                                <div class="input-group mb-3">
                                    <span class="input-group-text bg-white text-teal" style="color: #005C53;"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control required" placeholder="Email" required>
                                </div>
                                <div class="input-group mb-3">
                                    <span class="input-group-text bg-white text-teal" style="color: #005C53;"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control required" placeholder="Mật khẩu" required>
                                    <span class="input-group-text bg-white cursor-pointer"><i class="bi bi-eye"></i></span>
                                </div>
                                <div class="input-group mb-3">
                                    <span class="input-group-text bg-white text-teal" style="color: #005C53;"><i class="bi bi-telephone"></i></span>
                                    <input type="tel" class="form-control required" placeholder="Số điện thoại" required>
                                </div>
                                <div class="input-group mb-3">
                                    <span class="input-group-text bg-white text-teal" style="color: #005C53;"><i class="bi bi-house"></i></span>
                                    <select class="form-select">
                                        <option selected disabled>Tỉnh / Thành phố</option>
                                        <option value="HCM">TP. Hồ Chí Minh</option>
                                        <option value="HN">Vũng Tàu</option>
                                        <option value="BD">Bình Dương</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-4 text-center d-flex flex-column align-items-center mt-4 mt-md-0">
                                <p class="fw-bold mb-2 text-navy" style="color: #042940;"><i class="bi bi-person-badge text-teal" style="color: #005C53;"></i> Hình đại diện</p>
                                <div class="rounded-circle bg-light mb-3 d-flex align-items-center justify-content-center border border-3" style="width: 150px; height: 150px; border-color: #005C53 !important;">
                                    <i class="bi bi-image text-muted fs-1"></i>
                                </div>
                                <button type="button" class="btn btn-outline-success rounded-pill px-4" style="color: #042940; border-color: #9FC131;">
                                    <i class="bi bi-camera"></i> Tải ảnh lên
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="step-content" id="step-2">
                        <div class="input-group mb-3">
                            <span class="input-group-text bg-white text-teal" style="color: #005C53;"><i class="bi bi-mortarboard"></i></span>
                            <select class="form-select required">
                                <option selected disabled>Trình độ học vấn</option>
                                <option value="Sinh viên">Sinh viên</option>
                                <option value="Cử nhân">Cử nhân/Kỹ sư</option>
                                <option value="Giáo viên">Giáo viên</option>
                            </select>
                        </div>
                        <div class="input-group mb-3">
                            <span class="input-group-text bg-white text-teal" style="color: #005C53;"><i class="bi bi-building"></i></span>
                            <input type="text" class="form-control required" placeholder="Trường học/Cơ quan">
                        </div>
                        <div class="input-group mb-3">
                            <span class="input-group-text bg-white text-teal" style="color: #005C53;"><i class="bi bi-book"></i></span>
                            <input type="text" class="form-control required" placeholder="Chuyên ngành">
                        </div>
                        <div class="input-group mb-4">
                            <span class="input-group-text bg-white text-teal" style="color: #005C53;"><i class="bi bi-award"></i></span>
                            <input type="text" class="form-control" placeholder="Chứng chỉ bổ trợ">
                        </div>
                        <div class="p-4 border border-2 border-dashed rounded text-center bg-light">
                            <i class="bi bi-cloud-arrow-up text-teal fs-1" style="color: #005C53;"></i>
                            <p class="mb-1 mt-2 fw-bold text-navy" style="color: #042940;">Tải lên ảnh thẻ sinh viên / bằng cấp</p>
                            <input class="form-control form-control-sm mt-2 w-50 mx-auto" type="file">
                        </div>
                    </div>
                    <div class="step-content" id="step-3">
                        <div class="input-group mb-3">
                            <span class="input-group-text bg-white text-teal" style="color: #005C53;"><i class="bi bi-pen"></i></span>
                            <input type="text" class="form-control required" placeholder="Môn học đăng kí dạy">
                        </div>
                        <div class="input-group mb-3">
                            <span class="input-group-text bg-white text-teal" style="color: #005C53;"><i class="bi bi-layers"></i></span>
                            <select class="form-select required">
                                <option selected disabled>Khối lớp dạy</option>
                                <option value="cap1">Cấp 1</option>
                                <option value="cap2">Cấp 2</option>
                                <option value="cap3">Cấp 3</option>
                            </select>
                        </div>
                        <div class="input-group mb-3">
                            <span class="input-group-text bg-white text-teal" style="color: #005C53;"><i class="bi bi-cash-stack"></i></span>
                            <input type="text" class="form-control" placeholder="Học phí mong muốn">
                        </div>
                        
                        <div class="input-group mb-3">
                            <span class="input-group-text bg-white text-teal" style="color: #005C53;"><i class="bi bi-geo-alt"></i></span>
                            <select class="form-select required">
                                <option selected disabled>Hình thức học</option>
                                <option value="offline">Dạy trực tiếp</option>
                                <option value="online">Dạy trực tuyến</option>
                                <option value="both">Cả hai</option>
                            </select>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between mt-5 pt-3 border-top">
                        <button type="button" class="btn btn-outline-secondary px-4 rounded-pill d-none" id="btnPrev" onclick="changeStep(-1)">
                            <i class="bi bi-arrow-left"></i> Quay lại
                        </button>
                        <div class="ms-auto">
                            <button type="button" class="btn text-white px-4 rounded-pill shadow-sm" style="background-color: #005C53;" id="btnNext" onclick="changeStep(1)">
                                Tiếp tục <i class="bi bi-arrow-right"></i>
                            </button>
                            <button type="submit" class="btn btn-gocgiasu px-4 d-none" id="btnSubmit" style="background-color: #9FC131; color: #042940; font-weight: 700;">
                                Hoàn tất đăng ký <i class="bi bi-check-circle"></i>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentStep = 1;
        const totalSteps = 3;
        function updateUI() {
            document.querySelectorAll('.step-content').forEach((el, index) => {
                if(index + 1 === currentStep) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            });
            for(let i = 1; i <= totalSteps; i++) {
                let indicator = document.getElementById(`indicator-${i}`);
                if(i === currentStep) {
                    indicator.classList.add('active', 'text-white');
                    indicator.classList.remove('text-muted', 'completed');
                } else if (i < currentStep) {
                    indicator.classList.add('completed', 'text-white');
                    indicator.classList.remove('text-muted', 'active');
                } else {
                    indicator.classList.remove('active', 'completed', 'text-white');
                    indicator.classList.add('text-muted');
                }
            }
            const btnPrev = document.getElementById('btnPrev');
            const btnNext = document.getElementById('btnNext');
            const btnSubmit = document.getElementById('btnSubmit');
            if(currentStep === 1) {
                btnPrev.classList.add('d-none');
            } else {
                btnPrev.classList.remove('d-none');
            }
            if(currentStep === totalSteps) {
                btnNext.classList.add('d-none');
                btnSubmit.classList.remove('d-none');
            } else {
                btnNext.classList.remove('d-none');
                btnSubmit.classList.add('d-none');
            }
        }
        function changeStep(stepChange) {
            currentStep += stepChange;
            if(currentStep < 1) currentStep = 1;
            if(currentStep > totalSteps) currentStep = totalSteps;
            updateUI();
        }
        updateUI();
    </script>
</body>
</html>
