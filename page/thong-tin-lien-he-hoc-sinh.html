<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin liên hệ</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- CSS riêng -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
            <div class="card contact-card shadow-lg rounded-4 p-4 text-center">
                <!-- Tiêu đề -->
                <div class="contact-header">
                    <h6 class="contact-title">Thông tin liên hệ</h6>
                </div>

                <!-- Avatar -->
                <div class="mb-3">
                    <div class="avatar-circle mx-auto"
                         style="width: 80px; height: 80px; font-size: 28px;">
                        T
                    </div>
                </div>

                <!-- Tên -->
                <h5 class="fw-bold mb-1">Nguyễn Hương Mai</h5>

                <!-- Nội dung -->
                <div class="text-start mt-3">
                    <div class="mb-3">
                        <strong>Số điện thoại</strong>
                        <p class="fs-5 text-success mb-0">
                            <i class="fa-solid fa-phone me-2"></i>
                            +84 9xx xxx xxx
                        </p>
                    </div>
                    <div class="mb-3">
                        <strong>Zalo</strong>
                        <a href="#" class="btn btn-outline-success w-100 text-start mt-1">
                            <i class="fa-solid fa-comment-dots me-2"></i>
                            zalo.me/nguyenhuongmai
                        </a>
                    </div>
                    <div class="mb-3">
                        <strong>Facebook</strong>
                        <a href="#" class="btn btn-outline-primary w-100 text-start mt-1">
                            <i class="fa-brands fa-facebook me-2"></i>
                            fb.com/huongmai.student
                        </a>
                    </div>
                    <div class="mb-4">
                        <strong>Email</strong>
                        <p class="mb-0">
                            <i class="fa-solid fa-envelope me-2"></i>
                            huongmai.student@gmail.com
                        </p>
                    </div>
                </div>

                <!-- Ghi chú -->
                <div class="alert alert-warning small text-start">
                    <strong>Lưu ý:</strong> Vui lòng liên hệ ngoài giờ hành chính hoặc gửi tin nhắn Zalo.
                </div>

                <!-- Nút gọi -->
                <a href="#"
                   class="btn btn-contact w-100 py-3 rounded-pill fw-bold mt-2">
                    <i class="fa-solid fa-phone me-2"></i>
                    Gọi điện ngay
                </a>
            </div>
        </div>
    </div>
</div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
